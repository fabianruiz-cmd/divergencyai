<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blog · Divergency AI</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
<link rel="stylesheet" href="styles.css?v=28" />
<link rel="stylesheet" href="blog.css?v=28" />
<link rel="stylesheet" href="mobile.css?v=28" media="(max-width: 760px)" />

<!-- Si vienen desde móvil (m=1), forzar layout móvil siempre -->
<script>
(function() {
  const sp = new URLSearchParams(window.location.search);
  if (sp.get('m') === '1') {
    document.documentElement.classList.add('force-mobile');
    // Inyectar mobile.css sin media query
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'mobile.css?v=28';
    document.head.appendChild(link);
  }
})();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script>window.__MOBILE_PAGE__ = true;</script>
<script src="data/portfolio.js?v=28"></script>
<script type="text/babel" src="components/Navbar.jsx?v=28"></script>
<script type="text/babel" src="components/Footer.jsx?v=28"></script>
<script type="text/babel" src="mobile-app.jsx?v=28"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function getEpisode() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  return (window.THOUGHTS || []).find(t => t.id === id) || (window.THOUGHTS || [])[0];
}

function BlogPage() {
  const ep = getEpisode();
  const all = window.THOUGHTS || [];
  const idx = all.findIndex(t => t.id === ep.id);
  const related = all.filter(t => t.id !== ep.id).slice(0, 3);
  const epNum = String(idx + 1).padStart(2, '0');
  const isMobile = new URLSearchParams(window.location.search).get('m') === '1';

  useEffect(() => {
    document.title = `${ep.titulo} · Divergency`;
    window.scrollTo(0, 0);
  }, [ep.id]);

  const Shell = isMobile ? 'div' : 'div';
  const NavComp = isMobile ? window.MobileNav : Navbar;
  const FooterComp = isMobile ? window.MobileFooter : Footer;

  return (
    <div className={`blog-shell ${isMobile ? 'm-frame' : ''}`} style={{ '--ep-color': ep.color }}>
      <NavComp />

      <article className="blog">
        {/* Breadcrumb */}
        <nav className="blog__crumb">
          <a href="index.html">Inicio</a>
          <span>/</span>
          <a href="index.html#pensamos">Lo que pensamos</a>
          <span>/</span>
          <span className="blog__crumb-current">EP·{epNum}</span>
        </nav>

        {/* Header */}
        <header className="blog__head">
          <div className="blog__meta">
            <span className="blog__num">EP·{epNum}</span>
            <span className="blog__tag">{ep.etiqueta}</span>
            <span className="blog__date">2025</span>
          </div>
          <h1 className="blog__title">{ep.titulo}</h1>
          <p className="blog__lede">{ep.resumen}</p>
        </header>

        {/* Video / Hero */}
        <div className="blog__video">
          <div className="blog__video-frame">
            {ep.videoUrl ? (
              <iframe
                src={ep.videoUrl}
                title={ep.titulo}
                frameBorder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowFullScreen
              />
            ) : (
              <img src={ep.thumbnail} alt={ep.titulo} />
            )}
          </div>
        </div>

        {/* Body */}
        <div className="blog__body">
          {(ep.blog || []).map((p, i) => (
            <p key={i} className="blog__para">{p}</p>
          ))}

          <div className="blog__pull">
            <span className="blog__pull-mark">"</span>
            <p>La IA no reemplaza la intención. Reemplaza la fricción entre la intención y el resultado.</p>
          </div>

          {(ep.blog || []).slice(0, 1).map((p, i) => (
            <p key={'extra-'+i} className="blog__para">
              {p} El equipo de Divergency analiza cada uno de estos puntos en el episodio completo, donde se debaten ejemplos reales y casos de uso aplicados a Latinoamérica.
            </p>
          ))}
        </div>

        {/* Share */}
        <div className="blog__share">
          <span className="blog__share-label">Compartir</span>
          <div className="blog__share-icons">
            <a href="#" aria-label="LinkedIn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.8 0-5 2.2-5 5v14c0 2.8 2.2 5 5 5h14c2.8 0 5-2.2 5-5v-14c0-2.8-2.2-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.3c-1 0-1.7-.8-1.7-1.7s.8-1.7 1.7-1.7 1.7.8 1.7 1.7-.7 1.7-1.7 1.7zm13.5 12.3h-3v-5.6c0-1.4-.5-2.4-1.8-2.4-1 0-1.6.7-1.8 1.3-.1.2-.1.6-.1.9v5.8h-3v-11h3v1.5c.4-.6 1.1-1.5 2.7-1.5 2 0 3.5 1.3 3.5 4.1v6.9z"/></svg></a>
            <a href="#" aria-label="X"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            <a href="#" aria-label="WhatsApp"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg></a>
            <button type="button" aria-label="Copiar enlace" onClick={() => navigator.clipboard?.writeText(window.location.href)}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </button>
          </div>
        </div>

        {/* Related */}
        <section className="blog__related">
          <div className="blog__related-head">
            <div className="section__label">Sigue escuchando</div>
            <h2 className="blog__related-title">Otros episodios</h2>
          </div>
          <div className="blog__related-grid">
            {related.map((r, i) => {
              const ri = all.findIndex(t => t.id === r.id);
              return (
                <a key={r.id} href={`blog.html?id=${r.id}${isMobile ? '&m=1' : ''}`} className="blog__rel" style={{'--ep-color': r.color}}>
                  <div className="blog__rel-thumb">
                    <img src={r.thumbnail} alt={r.titulo} />
                    <div className="blog__rel-play"><svg width="14" height="14" viewBox="0 0 22 22"><path d="M7 5v12l10-6z" fill="currentColor"/></svg></div>
                  </div>
                  <div className="blog__rel-body">
                    <span className="blog__rel-num">EP·{String(ri + 1).padStart(2, '0')}</span>
                    <h3 className="blog__rel-title">{r.titulo}</h3>
                  </div>
                </a>
              );
            })}
          </div>
        </section>
      </article>

      <FooterComp />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BlogPage />);
</script>
</body>
</html>
