<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
html,body{margin:0;padding:0;background:var(--bg-void);color:var(--fg-primary);font-family:var(--font-body)}
.wrap{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:baseline;gap:16px}
.spec{color:var(--fg-slate);font-size:11px;font-family:var(--font-mono);flex:0 0 220px;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">

  <div class="row">
    <div style="color:var(--brand-cyan);font-weight:700;font-size:12px;letter-spacing:.4em;text-transform:uppercase">PLANES Y PRECIOS</div>
    <div class="spec">Eyebrow · Bold 700 · .4em</div>
  </div>

  <div class="row">
    <div style="font-weight:600;font-size:18px;color:var(--fg-primary)">Inversión que se paga sola</div>
    <div class="spec">Subtítulo · SemiBold 600 · 18</div>
  </div>

  <div class="row">
    <div style="font-weight:400;font-size:15px;color:var(--fg-muted);line-height:1.6">Nuestra IA no solo automatiza: entiende, se adapta y evoluciona con su negocio.</div>
    <div class="spec">Párrafo · Regular 400 · 15</div>
  </div>

  <div class="row">
    <div style="font-weight:500;font-size:13px;color:var(--fg-subtle)">Certificación en IA aplicada</div>
    <div class="spec">Etiqueta · Medium 500 · 13</div>
  </div>

</div>
</body>
</html>
