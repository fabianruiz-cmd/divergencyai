<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-void);font-family:var(--font-body);color:#fff}
.nav{height:80px;display:flex;align-items:center;padding:0 32px;justify-content:space-between;backdrop-filter:blur(24px);box-shadow:0 0 30px rgba(2,243,254,.06);background:rgba(3,5,44,.7);border-bottom:1px solid rgba(255,255,255,.06)}

/* Logo — grow slightly on hover */
.logo{height:24px;filter:brightness(0) invert(1);transition:transform .25s cubic-bezier(.22,1,.36,1),filter .25s ease;transform-origin:left center;cursor:pointer}
.logo:hover{transform:scale(1.06);filter:brightness(0) invert(1) drop-shadow(0 0 8px rgba(2,243,254,.5))}

/* Links — color to brand cyan on hover / active */
.links{display:flex;gap:36px;font-size:14px;font-weight:500;font-family:var(--font-body)}
.links a{color:#CBD5E1;text-decoration:none;transition:color .2s ease;display:inline-flex;align-items:center;gap:6px}
.links a:hover,.links a:focus-visible,.links a.is-active{color:#02F3FE;outline:none}

.chev{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.links a:hover .chev{transform:translateY(1px)}

.btn{border-radius:9999px;background:#02F3FE;color:#001B24;font-weight:700;font-size:14px;padding:12px 28px;border:0;cursor:pointer;letter-spacing:.02em;font-family:var(--font-body);transition:box-shadow .2s,transform .15s}
.btn:hover{box-shadow:0 0 24px rgba(2,243,254,.4)}
</style></head><body>
<div class="nav">
  <img class="logo" src="../assets/logos/divergency-logo-wordmark.png" alt="Divergency AI"/>
  <div class="links">
    <a href="#" class="is-active">Lo que hacemos
      <svg class="chev" viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </a>
    <a href="#">Lo que pensamos</a>
    <a href="#">Quiénes somos</a>
  </div>
  <button class="btn">Te apoyamos</button>
</div>
</body></html>
