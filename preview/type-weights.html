<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-void);color:var(--fg-primary);font-family:var(--font-body)}
.wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px}
.cell{border-radius:12px;border:1px solid var(--glass-hairline);padding:14px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.aA{font-family:var(--font-display);font-size:32px;line-height:1;color:var(--fg-primary)}
.lab{color:var(--fg-slate);font-size:10px;font-family:var(--font-mono)}
</style></head><body><div class="wrap">
  <div class="cell"><div class="aA" style="font-weight:100">Aa</div><div class="lab">100 · Thin</div></div>
  <div class="cell"><div class="aA" style="font-weight:300">Aa</div><div class="lab">300 · Light</div></div>
  <div class="cell"><div class="aA" style="font-weight:400">Aa</div><div class="lab">400 · Regular</div></div>
  <div class="cell"><div class="aA" style="font-weight:500">Aa</div><div class="lab">500 · Medium</div></div>
  <div class="cell"><div class="aA" style="font-weight:700">Aa</div><div class="lab">700 · Bold</div></div>
  <div class="cell"><div class="aA" style="font-weight:900">Aa</div><div class="lab">900 · Black</div></div>
</div></body></html>
