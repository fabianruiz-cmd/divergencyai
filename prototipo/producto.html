<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto · Divergency AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="../colors_and_type.css?v=28">
<link rel="stylesheet" href="styles.css?v=28">
<link rel="stylesheet" href="mobile.css?v=28" media="(max-width: 760px)" />

<!-- Si vienen desde móvil (m=1), forzar layout móvil -->
<script>
(function() {
  const sp = new URLSearchParams(window.location.search);
  if (sp.get('m') === '1') {
    document.documentElement.classList.add('force-mobile');
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'mobile.css?v=28';
    document.head.appendChild(link);
  }
})();
</script>

<script>
try {
  var t = localStorage.getItem("dvg-theme");
  if (t) document.documentElement.setAttribute("data-theme", t);
} catch (e) {}
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script>window.__MOBILE_PAGE__ = true;</script>
<script src="data/portfolio.js?v=28"></script>

<script type="text/babel" src="components/Navbar.jsx?v=28"></script>
<script type="text/babel" src="components/Footer.jsx?v=28"></script>
<script type="text/babel" src="mobile-app.jsx?v=28"></script>

<script type="text/babel">
function ProductPage() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id") || window.PORTFOLIO[0].id;
  const product = window.PORTFOLIO.find(p => p.id === id) || window.PORTFOLIO[0];
  const isMobile = params.get('m') === '1';
  const NavComp = isMobile ? window.MobileNav : Navbar;
  const FooterComp = isMobile ? window.MobileFooter : Footer;
  const mSuffix = isMobile ? '&m=1' : '';

  // Productos relacionados (misma categoría)
  const related = window.PORTFOLIO
    .filter(p => p.categoria === product.categoria && p.id !== product.id)
    .slice(0, 3);

  React.useEffect(() => {
    document.title = `${product.nombre} · Divergency AI`;
    window.scrollTo(0, 0);
  }, [product.id]);

  return (
    <div className={isMobile ? 'm-frame' : ''}>
      <NavComp />

      <article style={{ '--hue': product.color }}>
        <header className="product-banner">
          <div className="product-banner__bg" />

          {product.image && (
            <div className="product-banner__media">
              <img src={product.image} alt="" />
            </div>
          )}

          <nav className="product-banner__breadcrumb" aria-label="Migas">
            <a href="index.html">Inicio</a>
            <span className="sep">/</span>
            <a href={`lista.html?cat=${encodeURIComponent(product.categoria)}`}>{product.categoria}</a>
            <span className="sep">/</span>
            <span>{product.nombre}</span>
          </nav>

          <div className="product-banner__badges">
            {product.tipo && (
              <span className={`tipo-badge tipo-badge--${product.tipo}`}>{product.tipo}</span>
            )}
            <span className="chip" style={{ pointerEvents: 'none' }}>
              {product.categoriaLong || product.categoria}
            </span>
          </div>

          {/* Blurb = descripción sencilla y corta. EL HERO del banner */}
          <h1 className="product-banner__blurb">{product.blurb}</h1>

          <div className="product-banner__name">
            <span className="product-banner__name-dot" />
            <strong>{product.nombre}</strong>
          </div>
        </header>

        <div className="product-body">
          <p className="product-body__lede">{product.tagline}.</p>

          <section className="product-body__section">
            <div className="product-body__section-label">Qué es</div>
            <p className="product-body__p">{product.descripcion}</p>
          </section>

          <section className="product-body__section">
            <div className="product-body__section-label">Qué obtienes</div>
            <h2 className="product-body__h">Resultado concreto, no promesa.</h2>
            <p className="product-body__p">{product.resultado}</p>
          </section>

          {product.para && product.para.length > 0 && (
            <section className="product-body__section">
              <div className="product-body__section-label">Para quién</div>
              <ul className="product-body__list">
                {product.para.map((p, i) => <li key={i}>{p}</li>)}
              </ul>
            </section>
          )}

          <div className="product-body__cta-wrap">
            <div className="product-body__cta-text">
              <strong>¿Listo para probarlo?</strong>
              <span>Te contactamos en menos de 24 horas y agendamos una demo.</span>
            </div>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              {product.link && product.link !== "#" && (
                <a href={product.link} target="_blank" rel="noopener" className="btn-ghost">
                  Ver en vivo
                  <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3h6v6M3 9l6-6" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round"/></svg>
                </a>
              )}
              <a href="#contacto" className="btn-primary">
                Te contactamos
                <svg width="14" height="10" viewBox="0 0 14 10"><path d="M1 5h12M9 1l4 4-4 4" stroke="currentColor" strokeWidth="1.6" fill="none" strokeLinecap="round"/></svg>
              </a>
            </div>
          </div>

          {related.length > 0 && (
            <section className="product-body__section" style={{ marginTop: 96 }}>
              <div className="product-body__section-label">Relacionados</div>
              <h2 className="product-body__h" style={{ marginBottom: 32 }}>
                Otros {product.categoria.toLowerCase()} que podrían servirte.
              </h2>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 16 }}>
                {related.map(r => (
                  <a key={r.id} className="lista-card" href={`producto.html?id=${r.id}${mSuffix}`} style={{ '--hue': r.color }}>
                    <div className="lista-card__media" style={{ aspectRatio: '4/3' }}>
                      {r.image ? (
                        <img src={r.image} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }}/>
                      ) : (
                        <div className="lista-card__glyph" style={{ fontSize: 40 }}>{r.nombre.charAt(0)}</div>
                      )}
                    </div>
                    <div className="lista-card__body" style={{ padding: '18px 18px 22px' }}>
                      <h3 className="lista-card__blurb" style={{ fontSize: 15, marginBottom: 12 }}>{r.nombre}</h3>
                      <div className="lista-card__name" style={{ fontSize: 10 }}>
                        <span className="lista-card__name-dot" />
                        {r.tipo || r.categoria}
                      </div>
                    </div>
                  </a>
                ))}
              </div>
            </section>
          )}
        </div>
      </article>

      <FooterComp />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProductPage />);
</script>
</body>
</html>
