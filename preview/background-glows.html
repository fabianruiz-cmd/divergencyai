<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/><style>html,body{margin:0;padding:0;background:#010512;font-family:Inter,sans-serif;min-height:180px;position:relative;overflow:hidden}
.glow{position:absolute;width:600px;height:600px;border-radius:50%;opacity:.35;filter:blur(40px);background:radial-gradient(circle, rgba(0,249,249,.6) 0%, rgba(0,249,249,.1) 40%, transparent 75%);left:-200px;top:-260px;pointer-events:none}
.glow2{position:absolute;width:600px;height:600px;border-radius:50%;opacity:.25;filter:blur(40px);background:radial-gradient(circle, rgba(0,249,249,.6) 0%, rgba(0,249,249,.1) 40%, transparent 75%);right:-240px;bottom:-320px;pointer-events:none}
.content{position:relative;padding:36px 40px;color:#fff}
.eyebrow{color:#22D3EE;font-size:11px;font-weight:700;letter-spacing:.4em;text-transform:uppercase}
.h{font-family:'Space Grotesk';font-weight:700;font-size:42px;line-height:1.05;margin-top:12px;max-width:780px}
</style></head><body>
<div class="glow"></div><div class="glow2"></div>
<div class="content">
  <div class="eyebrow">ÉTICA DE DATOS</div>
  <div class="h">Su información es privada y no entrena modelos públicos.</div>
</div>
</body></html>
