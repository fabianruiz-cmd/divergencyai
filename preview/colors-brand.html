<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:#0A0A12;font-family:var(--font-body)}
.wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px}
.sw{border-radius:14px;height:128px;display:flex;flex-direction:column;justify-content:space-between;padding:14px;border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}
.n{color:#fff;font-size:13px;font-weight:700}
.v{color:rgba(255,255,255,.7);font-size:11px;font-family:var(--font-mono);margin-top:2px}
.role{color:rgba(255,255,255,.55);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.dark .n,.dark .v,.dark .role{color:rgba(255,255,255,.9)}
.light .n{color:#010D73}.light .v{color:rgba(1,13,115,.7)}.light .role{color:rgba(1,13,115,.65)}
</style></head><body><div class="wrap">

  <div class="sw dark" style="background:#03052C">
    <div class="role">Void</div>
    <div><div class="n">brand‑void</div><div class="v">#03052C</div></div>
  </div>

  <div class="sw dark" style="background:#010D73">
    <div class="role">Deep blue</div>
    <div><div class="n">brand‑deep‑blue</div><div class="v">#010D73</div></div>
  </div>

  <div class="sw dark" style="background:#1D19AB">
    <div class="role">Indigo</div>
    <div><div class="n">brand‑indigo</div><div class="v">#1D19AB</div></div>
  </div>

  <div class="sw light" style="background:#02F3FE;box-shadow:0 0 30px rgba(2,243,254,.35)">
    <div class="role">Cyan · signature</div>
    <div><div class="n">brand‑cyan</div><div class="v">#02F3FE</div></div>
  </div>

</div></body></html>
