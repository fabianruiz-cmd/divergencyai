<!DOCTYPE html>
<html><head>

</style></head><body><div class="wrap">
  <div class="tile"><img src="../assets/icons/shield.svg"/></div>

  <div class="tile"><img src="../assets/icons/eye.svg"/></div>
  <div class="tile"><img src="../assets/icons/check-badge.svg"/></div>
  <div class="tile"><img src="../assets/icons/book.svg"/></div>
  <div class="tile"><img src="../assets/icons/brain.svg"/></div>
  <div class="tile"><img src="../assets/icons/ar.svg"/></div>
</div></body></html>
