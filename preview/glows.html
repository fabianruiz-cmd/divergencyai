<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/><style>html,body{margin:0;padding:0;background:#010512;font-family:Inter,sans-serif;color:#CBD5E1}
.wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px}
.cell{border-radius:12px;padding:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);height:90px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px}
.chip{width:56px;height:56px;border-radius:16px;background:rgba(22,78,99,.3);border:1px solid rgba(34,211,238,.2);box-shadow:0 0 15px rgba(0,249,249,.2);display:flex;align-items:center;justify-content:center;color:#22D3EE;font-weight:700;font-size:11px}
.lab{font-size:10px;color:#94A3B8;font-family:'JetBrains Mono',monospace}
</style></head><body><div class="wrap">
  <div class="cell"><div class="chip">SOFT</div><div class="lab">0 0 15px / .2</div></div>
  <div class="cell"><div class="chip" style="box-shadow:0 0 30px rgba(0,249,249,.3)">MID</div><div class="lab">0 0 30px / .3</div></div>
  <div class="cell"><div class="chip" style="box-shadow:0 0 50px rgba(0,249,249,.5)">STRONG</div><div class="lab">0 0 50px / .5</div></div>
</div></body></html>
