<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/><style>html,body{margin:0;padding:0;background:#010512;font-family:Inter,sans-serif;color:#fff}
.wrap{padding:20px}
.card{border-radius:40px;background:rgba(16,28,71,.4);border:1px solid rgba(34,211,238,.2);backdrop-filter:blur(16px);box-shadow:0 0 50px rgba(0,249,249,.05);padding:32px;position:relative;overflow:hidden}
.top{position:absolute;left:0;right:0;top:0;height:4px;background:linear-gradient(90deg, rgba(34,211,238,0) 0%, #22D3EE 50%, rgba(34,211,238,0) 100%)}
.eyebrow{text-align:center;color:#22D3EE;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase}
.price{font-family:'Space Grotesk';font-weight:700;font-size:48px;text-align:center;margin-top:10px}
.per{color:#94A3B8;font-size:14px;margin-left:6px;font-weight:500}
.desc{color:#CBD5E1;font-weight:300;font-size:13px;text-align:center;margin:14px auto 18px;max-width:320px}
.btn{display:block;margin:0 auto;border-radius:9999px;background:#22D3EE;color:#003737;font-weight:700;padding:14px 32px;border:0;font-size:15px;cursor:pointer}
</style></head><body><div class="wrap">
  <div class="card"><div class="top"></div>
    <div class="eyebrow">PAGO POR USO</div>
    <div class="price">$11 USD<span class="per">/prueba</span></div>
    <div class="desc">Acceso completo a nuestro motor de IA y reportes ejecutivos automatizados.</div>
    <button class="btn">Comenzar ahora</button>
  </div>
</div></body></html>
