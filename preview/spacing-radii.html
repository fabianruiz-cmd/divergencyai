<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-void);font-family:var(--font-body);color:#fff}
.wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:22px;padding:22px}
.section-title{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:14px}
.row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar{height:10px;background:#02F3FE;border-radius:2px;box-shadow:0 0 12px rgba(2,243,254,.35);flex:0 0 auto}
.lab{font-size:11px;color:rgba(255,255,255,.75);font-family:var(--font-mono);letter-spacing:.02em;min-width:72px}
.px{color:rgba(255,255,255,.45);font-size:10px;font-family:var(--font-mono)}

.radii{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rc{aspect-ratio:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.rn{font-size:11px;font-weight:600;color:#fff}
.rv{font-size:9px;font-family:var(--font-mono);color:rgba(255,255,255,.55)}
</style></head><body><div class="wrap">

  <div>
    <div class="section-title">Spacing · base 8</div>
    <div class="row"><div class="bar" style="width:8px"></div>  <div class="lab">space‑1</div><div class="px">8 · 1×</div></div>
    <div class="row"><div class="bar" style="width:16px"></div> <div class="lab">space‑2</div><div class="px">16 · 2×</div></div>
    <div class="row"><div class="bar" style="width:24px"></div> <div class="lab">space‑3</div><div class="px">24 · 3×</div></div>
    <div class="row"><div class="bar" style="width:32px"></div> <div class="lab">space‑4</div><div class="px">32 · 4×</div></div>
    <div class="row"><div class="bar" style="width:48px"></div> <div class="lab">space‑6</div><div class="px">48 · 6×</div></div>
    <div class="row"><div class="bar" style="width:64px"></div> <div class="lab">space‑8</div><div class="px">64 · 8×</div></div>
    <div class="row"><div class="bar" style="width:96px"></div> <div class="lab">space‑12</div><div class="px">96 · 12×</div></div>
  </div>

  <div>
    <div class="section-title">Radii · base 8</div>
    <div class="radii">
      <div class="rc" style="border-radius:8px"><div class="rn">sm</div><div class="rv">8</div></div>
      <div class="rc" style="border-radius:16px"><div class="rn">md</div><div class="rv">16</div></div>
      <div class="rc" style="border-radius:24px"><div class="rn">lg</div><div class="rv">24</div></div>
      <div class="rc" style="border-radius:32px"><div class="rn">xl</div><div class="rv">32</div></div>
      <div class="rc" style="border-radius:40px"><div class="rn">2xl</div><div class="rv">40</div></div>
      <div class="rc" style="border-radius:9999px"><div class="rn">pill</div><div class="rv">∞</div></div>
    </div>
  </div>

</div></body></html>
