<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/><style>html,body{margin:0;padding:0;background:#010512;font-family:Inter,sans-serif}
.wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:20px}
.sw{border-radius:10px;height:72px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
.chip{width:28px;height:28px;border-radius:6px;margin-bottom:6px;border:1px solid rgba(255,255,255,.1)}
.n{color:#fff;font-size:11px;font-weight:700}
.v{color:rgba(255,255,255,.55);font-size:9px;font-family:'JetBrains Mono',monospace;margin-top:2px}
</style></head><body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="n">fg‑primary</div><div class="v">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#F4FFFE"></div><div class="n">fg‑bright</div><div class="v">#F4FFFE</div></div>
  <div class="sw"><div class="chip" style="background:#F1F3FC"></div><div class="n">fg‑soft</div><div class="v">#F1F3FC</div></div>
  <div class="sw"><div class="chip" style="background:#CBD5E1"></div><div class="n">fg‑body</div><div class="v">#CBD5E1</div></div>
  <div class="sw"><div class="chip" style="background:#B9CAC9"></div><div class="n">fg‑muted</div><div class="v">#B9CAC9</div></div>
  <div class="sw"><div class="chip" style="background:#A8ABB3"></div><div class="n">fg‑subtle</div><div class="v">#A8ABB3</div></div>
  <div class="sw"><div class="chip" style="background:#989898"></div><div class="n">fg‑quiet</div><div class="v">#989898</div></div>
  <div class="sw"><div class="chip" style="background:#94A3B8"></div><div class="n">fg‑slate</div><div class="v">#94A3B8</div></div>
  <div class="sw"><div class="chip" style="background:#44484F"></div><div class="n">fg‑divider</div><div class="v">#44484F</div></div>
</div></body></html>
