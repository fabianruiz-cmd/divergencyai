<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:#0A0A12;font-family:var(--font-body)}
.wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px}
.sw{border-radius:10px;height:90px;display:flex;flex-direction:column;justify-content:space-between;padding:12px;border:1px solid rgba(255,255,255,.08)}
.n{color:#fff;font-size:11px;font-weight:700}
.v{color:rgba(255,255,255,.6);font-size:9px;font-family:var(--font-mono)}
.role{color:rgba(255,255,255,.45);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.light .n{color:#010D73}.light .v{color:rgba(1,13,115,.7)}.light .role{color:rgba(1,13,115,.6)}
</style></head><body><div class="wrap">

  <div class="sw" style="background:#03052C"><div class="role">Page bg</div><div><div class="n">bg‑void</div><div class="v">#03052C</div></div></div>
  <div class="sw" style="background:#040A4A"><div class="role">Lifted</div><div><div class="n">bg‑deep‑1</div><div class="v">#040A4A</div></div></div>
  <div class="sw" style="background:#010D73"><div class="role">Section</div><div><div class="n">bg‑deep‑blue</div><div class="v">#010D73</div></div></div>
  <div class="sw" style="background:#0C1562"><div class="role">Card</div><div><div class="n">bg‑panel</div><div class="v">#0C1562</div></div></div>

  <div class="sw" style="background:#101C7A"><div class="role">Card hi</div><div><div class="n">bg‑panel‑2</div><div class="v">#101C7A</div></div></div>
  <div class="sw" style="background:#1D19AB"><div class="role">Accent fill</div><div><div class="n">brand‑indigo</div><div class="v">#1D19AB</div></div></div>
  <div class="sw" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px)"><div class="role">Glass</div><div><div class="n">glass‑fill</div><div class="v">rgba 255·.05</div></div></div>
  <div class="sw light" style="background:#F3F6FF"><div class="role">Off‑white</div><div><div class="n">bg‑light</div><div class="v">#F3F6FF</div></div></div>

</div></body></html>
