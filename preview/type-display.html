<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-void);color:var(--fg-primary);font-family:var(--font-body)}
.wrap{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:baseline;gap:20px}
.spec{color:var(--fg-slate);font-size:11px;font-family:var(--font-mono);letter-spacing:.05em;flex:0 0 auto;white-space:nowrap}
.t{font-family:var(--font-display);letter-spacing:-.015em;line-height:1}
.sub{font-family:var(--font-display);line-height:1.2}
.body{font-family:var(--font-body);line-height:1.55;color:var(--fg-muted);max-width:460px}
hr{border:0;border-top:1px solid var(--glass-hairline);margin:4px 0}
</style></head><body><div class="wrap">

  <div class="row"><div class="t" style="font-weight:900;font-size:52px">Rompe el patrón</div><div class="spec">Título · Black 900 · 52</div></div>
  <div class="row"><div class="t" style="font-weight:800;font-size:38px">IA que actúa, no promete</div><div class="spec">Título · ExtraBold 800 · 38</div></div>

  <hr/>

  <div class="row"><div class="sub" style="font-weight:600;font-size:22px">El cerebro de su empresa</div><div class="spec">Subtítulo · SemiBold 600 · 22</div></div>

  <hr/>

  <div class="row"><div class="body" style="font-weight:400;font-size:15px">Soluciones de inteligencia artificial diseñadas para escalar su operación comercial con claridad.</div><div class="spec">Párrafo · Regular 400 · 15</div></div>

</div></body></html>
